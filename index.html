<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page protégée</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
        font-family: Arial, sans-serif;
    }
    .login-box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        text-align: center;
        width: 300px;
    }
    input {
        display: block;
        width: 90%;
        margin: 10px auto;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    button {
        padding: 10px 20px;
        border: none;
        background-color: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover { background-color: #0056b3; }
</style>
</head>
<body>

<div class="login-box">
    <h2>Connexion requise</h2>
    <input type="text" id="username" placeholder="Nom d'utilisateur">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <p id="error" style="color:red"></p>
</div>

<script>
async function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const errorEl = document.getElementById('error');

    try {
        // Exemple de fichier JSON local : [{"username":"test","password":"1234"}]
        const res = await fetch('/stjo/users.json');
        const users = await res.json();

        const valid = users.some(u => u.username === user && u.password === pass);

        if (valid) {
            // Si valide, on "déverrouille" la page (par ex. afficher l’iframe)
            window.location.href = 'interstellar.html'; 
        } else {
            errorEl.textContent = "Identifiants incorrects.";
        }
    } catch (e) {
        errorEl.textContent = "Erreur de chargement du fichier des utilisateurs.";
    }
}
</script>

</body>
</html>
